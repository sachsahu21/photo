# ============================================================
# IMAGE SCANNER v2.5 - COMPLETE CONFIGURATION
# ============================================================
#
# QUICK START:
#   1. Set scan.folder_path to your images folder
#   2. Set organization.output_folder to where you want organized files
#   3. Run: python main.py
#
# SPEED GUIDE:
#   FASTEST (metadata only, ~1000 files/min):
#     fast_mode: true, duplicates: false, similar: false
#
#   FAST (metadata + duplicates, ~500 files/min):
#     fast_mode: true, duplicates: true, similar: false
#
#   BALANCED (metadata + duplicates + blur, ~200 files/min):
#     fast_mode: false, duplicates: true, similar: false
#
#   THOROUGH (everything except SIFT, ~50 files/min):
#     fast_mode: false, duplicates: true, similar: true, sift: false
#
#   EXHAUSTIVE (all features, ~20 files/min):
#     fast_mode: false, all enabled, sift: true
#
# ============================================================


# ============================================================
# SCAN SETTINGS
# ============================================================
scan:
  # REQUIRED: Path to folder containing images/videos
  # Windows: "C:\\Users\\John\\Pictures"
  # Mac/Linux: "/home/john/Pictures"
  folder_path: "C:\\Users\\ISSUser\\Desktop\\Sachin\\hdd\\pic\\Sachin\\sach_unorganized\\google"

  # Scan subfolders recursively?
  # true  = scan all subfolders (recommended)
  # false = only top-level folder (faster for flat folders)
  # SPEED: false is faster if images are only in root
  recursive: true

  # File extensions to scan
  # Remove extensions you don't have to speed up file discovery
  extensions:
    images:
      - jpg
      - jpeg
      - png
      - gif
      - bmp
      - tiff
      - tif
      - webp
      - heic       # iPhone iOS 11+ (needs pillow-heif package)
      - heif
      - raw
      - cr2        # Canon RAW
      - cr3        # Canon RAW newer
      - nef        # Nikon RAW
      - arw        # Sony RAW
      - dng        # Adobe Digital Negative
      - orf        # Olympus RAW
      - rw2        # Panasonic RAW
      - pef        # Pentax RAW
      - sr2        # Sony RAW older
      - raf        # Fujifilm RAW
    videos:
      - mp4
      - mov
      - avi
      - mkv
      - 3gp
      - m4v
      - mpg
      - mpeg
      - wmv
      - flv
      - webm
      - mts
      - ts
      - vob


# ============================================================
# BLUR DETECTION
# ============================================================
blur_detection:
  # Detect blurry/sharp images using Laplacian variance
  # Auto-disabled when fast_mode is true
  # SPEED: disable for ~20% faster scan
  # true  = detect blur (adds blur_score, quality_rating columns)
  # false = skip blur detection
  enabled: true

  # Blur threshold - lower = stricter
  #   30   = very strict (most images marked blurry)
  #   50   = strict
  #   100  = balanced (recommended)
  #   200  = lenient
  #   500  = very lenient
  threshold: 100


# ============================================================
# EXACT DUPLICATE DETECTION (byte-identical files)
# ============================================================
duplicates:
  # Find byte-identical duplicate files via hash
  # SPEED: disable for ~30% faster scan (no hash calculation)
  # true  = calculate MD5/SHA256 hash, find identical files
  # false = skip entirely
  enabled: true

  # Hash algorithm
  # "md5"    = faster, sufficient for duplicates (recommended)
  # "sha256" = slower, cryptographically stronger (overkill here)
  # SPEED: md5 is ~2x faster than sha256
  hash_algorithm: "md5"

  # Match mode
  # "exact" = byte-for-byte identical only
  # For visual similarity use similar_detection section below
  match_mode: "exact"

  # Only used if match_mode is "similar" (future feature)
  similarity_threshold: 90

  # How to pick "best" file in duplicate group (priority order)
  # Remaining files get delete_flag = Yes
  # "quality"    = higher quality score wins
  # "resolution" = higher pixel count wins
  # "date"       = newer date wins
  # "size"       = larger file size wins
  selection_criteria:
    - quality
    - resolution
    - date
    - size


# ============================================================
# SIMILAR IMAGE DETECTION (visually alike, not byte-identical)
# ============================================================
similar_detection:
  # Master switch - find visually similar images
  # SEPARATE from exact duplicates:
  #   Exact = identical bytes (same file copied)
  #   Similar = visually alike (resized, recompressed, cropped)
  #
  # SPEED IMPACT: HIGH - this is the slowest feature
  #   10K images with max_compare=200: ~2M comparisons (~5-15 min)
  #   10K images with max_compare=500: ~5M comparisons (~15-30 min)
  #
  # true  = compute perceptual hashes, compare images
  # false = skip entirely (much faster)
  enabled: false

  # ── ALGORITHMS ──
  # Enable multiple for better accuracy
  # Each adds ~0.03-0.3 sec per image during hash computation
  # At least one must be true when enabled=true

  # Average Hash (aHash)
  # Speed: ~0.03 sec/image (fastest)
  # Accuracy: 75-80%
  # Catches: resized copies, slight color changes
  # False positives: moderate
  ahash: true

  # Perceptual Hash (pHash) - BEST BALANCE
  # Speed: ~0.05 sec/image
  # Accuracy: 85-90%
  # Catches: resized, recompressed, format converted
  # False positives: low
  # Note: install scipy for better results (pip install scipy)
  phash: true

  # Difference Hash (dHash)
  # Speed: ~0.03 sec/image
  # Accuracy: 80-85%
  # Catches: resized, brightness/contrast changes
  # False positives: low-moderate
  dhash: true

  # Color Histogram Comparison
  # Speed: ~0.05 sec/image
  # Accuracy: 70% (more false positives)
  # Catches: similar color palette
  # WARNING: all sunset/sky photos may match each other
  # SPEED: adds comparison time, disable for faster
  # true  = enable (more matches, more false positives)
  # false = disable (recommended for speed)
  color_histogram: false

  # SIFT/ORB Feature Matching
  # Speed: ~0.3 sec/image (SLOWEST algorithm)
  # Accuracy: 90%+ for scene matching
  # Catches: same scene different angle, cropped, rotated
  # Requires: opencv
  # SPEED: VERY SLOW - only enable for small collections (<1000 images)
  # true  = enable (slow but most accurate)
  # false = disable (recommended for speed)
  sift: false

  # ── THRESHOLDS ──
  # Lower = stricter (fewer matches, fewer false positives)
  # Higher = looser (more matches, more false positives)

  # Hash thresholds (Hamming distance)
  # 0  = identical only (too strict, misses resized copies)
  # 3  = very strict
  # 5  = strict
  # 6  = moderate-strict (good for reducing false positives)
  # 8  = moderate
  # 10 = balanced (recommended starting point)
  # 12 = slightly loose
  # 15 = loose (many false positives)
  # 20 = very loose
  ahash_threshold: 6
  phash_threshold: 8
  dhash_threshold: 6

  # Histogram cosine similarity (0.0 to 1.0)
  # 0.95 = very strict (nearly identical colors)
  # 0.90 = strict
  # 0.85 = balanced (recommended)
  # 0.80 = moderate
  # 0.75 = loose
  histogram_threshold: 0.85

  # SIFT minimum matching keypoints
  # 50  = strict
  # 30  = balanced (recommended)
  # 20  = loose
  # 10  = very loose
  sift_threshold: 30

  # Hash image size (NxN pixels)
  # 8  = fast, good for most cases (recommended)
  # 16 = more accurate, 4x slower
  # 32 = most accurate, 16x slower
  # SPEED: 8 is fastest
  hash_size: 8

  # Max comparisons per image
  # Prevents O(n^2) explosion for large collections
  # SPEED: lower = much faster but may miss some pairs
  #   50   = very fast, may miss distant pairs
  #   100  = fast (recommended for speed)
  #   200  = balanced
  #   500  = thorough (slow for 10K+ images)
  #   1000 = very thorough
  max_compare_per_image: 100


# ============================================================
# FILE ORGANIZATION
# ============================================================
organization:
  # REQUIRED: Output folder for organized files
  output_folder: "C:\\Users\\ISSUser\\Desktop\\Sachin\\hdd\\organized"

  # Minimum photos per day for a daily folder
  # Days with fewer photos go into monthly folders
  #   1   = every date gets own folder (many small folders)
  #   10  = need 10+ photos for daily folder
  #   30  = moderate
  #   60  = balanced (recommended)
  #   100 = only busy days get own folder
  #   999 = almost everything monthly
  day_threshold: 60

  # Prefer EXIF date over file modified date?
  # true  = use EXIF DateTaken if available, fallback to file date
  # false = always use file modified date
  use_exif_date: true

  # File operation
  # "copy" = safe, originals untouched (recommended first time)
  # "move" = saves disk space, originals removed (IRREVERSIBLE)
  # TIP: use copy first, verify, then move
  operation: "copy"

  # Filename conflict resolution
  # "rename"    = add -1, -2, -3 suffix (safest, recommended)
  # "skip"      = skip the file
  # "overwrite" = replace existing (dangerous with move!)
  conflict_resolution: "rename"

  # Reuse existing dated folders?
  # true  = add to existing "2026-03-15-085pic" and update count
  # false = always create new folders
  reuse_existing_folders: true

  # Create videos subfolder inside date folders?
  # true  = "2026-03-15-085pic/videos/" for video files
  # false = videos alongside images
  video_subfolder: true

  # Folder naming structure
  # "flat"            = all folders in output root
  #                     Organized/
  #                       2022-01-30-020pic-beach/
  #                       2022-03-00-012pic/
  #                       2024-03-screenshots-045pic/
  #                       undated-005pic/
  #
  # "year"            = grouped by year only
  #                     Organized/
  #                       2022/
  #                         2022-01-30-020pic-beach/
  #                         2022-03-00-012pic/
  #                         2022-11-15-085pic-tokyo/
  #                       2024/
  #                         2024-03-screenshots-045pic/
  #                       undated-005pic/
  #
  # "year-month-date" = grouped by year then month
  #                     Organized/
  #                       2022/
  #                         01-Jan/
  #                           2022-01-30-020pic-beach/
  #                         03-Mar/
  #                           2022-03-00-012pic/
  #                         11-Nov/
  #                           2022-11-15-085pic-tokyo/
  #                       2024/
  #                         03-Mar/
  #                           2024-03-screenshots-045pic/
  #                       undated-005pic/
  #
  # Can convert between structures anytime using menu option 7
  folder_structure: "flat"

  # Auto-detect and separate screenshots
  # true  = screenshots go to separate folders
  # false = screenshots mixed with regular photos
  separate_screenshots: true

  # Screenshot detection keywords (case insensitive)
  # Files with these words in filename are tagged as screenshots
  # Add your own patterns here
  screenshot_keywords:
    - screenshot
    - screen_shot
    - screen-shot
    - capture
    - snip
    - snipaste
    - sharex
    - screen recording
    - screenrecording
    - printscreen

  # Also detect screenshots by screen resolution?
  # true  = if image matches phone/tablet resolution AND has no/minimal EXIF
  # false = only use filename keywords
  screenshot_detect_by_resolution: true

  # Add custom screen resolutions for detection
  # Format: [[width, height], [width, height]]
  # Example: [[1080, 2400], [1440, 3200]]
  # Leave empty to use built-in list only
  screenshot_custom_resolutions: []


# ============================================================
# OUTPUT / EXCEL REPORT
# ============================================================
output:
  # Folder for Excel reports
  output_folder: "./reports"

  # Excel filename prefix
  # Final: {prefix}-{folder_name}-{timestamp}.xlsx
  filename_prefix: "image-scan"

  # Sheets to include
  # Disable unused sheets for smaller file
  sheets:
    all_images: true          # Every file with all metadata
    blurry_images: true       # Only blurry files
    duplicates: true          # Only exact duplicates
    similar_images: true      # Only visually similar
    summary: true             # Overview statistics
    quality_report: true      # Quality breakdown
    analytics: true           # Storage analytics
    clusters: true            # Image clusters (if enabled)


# ============================================================
# PROCESSING / PERFORMANCE
# ============================================================
processing:
  # Parallel threads (currently unused, reserved for future)
  # 0 = auto, 1 = single, 4 = recommended
  threads: 4

  # Show progress bar
  # true  = show tqdm progress bar
  # false = silent (slightly faster)
  show_progress: true

  # Verbose debug logging
  # true  = DEBUG level (very noisy)
  # false = INFO level (recommended)
  verbose: false

  # Checkpoint for crash recovery
  # true  = save progress every N files, resume on restart
  # false = start from scratch on crash
  # SPEED: tiny overhead, worth keeping enabled
  checkpoint_enabled: true

  # Checkpoint interval
  #   50  = frequent saves (safer, tiny overhead)
  #   100 = balanced (recommended)
  #   500 = less frequent
  checkpoint_interval: 100

  # FAST MODE - biggest speed impact
  # Disables: blur detection, face detection, auto tagging, thumbnails
  # Keeps: metadata extraction, hash, duplicates, similar
  # SPEED: ~3x faster scan
  # true  = fast scan
  # false = full feature scan
  fast_mode: false

  # Skip hashing video files?
  # Videos are large, hashing is slow
  # SPEED: true saves significant time if you have many videos
  # true  = no video hash (cannot detect video duplicates)
  # false = hash every video (slow for large files)
  skip_video_hash: false


# ============================================================
# FACE DETECTION
# ============================================================
face_detection:
  # Detect faces in images
  # Auto-disabled in fast_mode
  # Adds: face_count, face_category columns
  # Categories: No People, Portrait, Couple, Small Group, Group, Large Group
  # SPEED: moderate impact (~0.1 sec/image)
  # true  = detect faces
  # false = skip (faster)
  enabled: false

  # Detection method
  # "opencv" = Haar cascade (fast, built-in, no download)
  method: "opencv"

  # Minimum face size in pixels
  # Lower = detect smaller faces but more false positives
  # 20 = detect small faces
  # 30 = balanced (recommended)
  # 50 = only large faces
  min_face_size: 30

  # Scale factor for multi-scale detection
  # Lower = more accurate but slower
  # 1.05 = very accurate, slow
  # 1.1  = balanced (recommended)
  # 1.2  = fast, may miss some faces
  scale_factor: 1.1

  # Minimum neighbors for detection confidence
  # Lower = more detections, more false positives
  # 3 = more faces detected, some false
  # 5 = balanced (recommended)
  # 8 = strict, fewer false positives
  min_neighbors: 5


# ============================================================
# THUMBNAILS
# ============================================================
thumbnails:
  # Generate thumbnail previews
  # Auto-disabled in fast_mode
  # SPEED: moderate impact (~0.05 sec/image)
  # true  = generate thumbnails
  # false = skip (faster)
  enabled: false

  # Thumbnail size [width, height] pixels
  # [100, 75]  = small
  # [150, 100] = balanced (recommended)
  # [200, 150] = medium
  # [300, 200] = large
  size: [150, 100]

  # Thumbnail storage folder
  output_folder: "./thumbnails"

  # Embed in Excel (makes file very large)
  # true  = thumbnails inside Excel
  # false = separate files (recommended)
  embed_in_excel: false


# ============================================================
# IMAGE CLUSTERING
# ============================================================
clustering:
  # Group images by visual similarity using KMeans
  # Requires: pip install scikit-learn
  # Adds: cluster_id, cluster_label columns
  # SPEED: moderate for large collections
  # true  = cluster images
  # false = skip (faster)
  enabled: false

  # Clustering method
  # "color_histogram" = group by color distribution
  method: "color_histogram"

  # Number of clusters
  #  5 = few large groups
  # 10 = balanced (recommended)
  # 20 = many small groups
  # 50 = very granular
  n_clusters: 10

  # Minimum images per cluster to include in report
  # 2 = include pairs
  # 3 = balanced (recommended)
  # 5 = only significant groups
  min_cluster_size: 3


# ============================================================
# GEOCODING (GPS to Location Name)
# ============================================================
geocoding:
  # Reverse geocode GPS coordinates to city/country
  # Requires: pip install reverse_geocoder
  # Adds: location_city, location_country, location_name
  # Works offline (no internet needed)
  # SPEED: first run downloads database (~50MB), then fast
  # true  = geocode GPS coordinates
  # false = skip
  enabled: false

  # "offline" = local database (recommended)
  method: "offline"


# ============================================================
# AUTO TAGGING
# ============================================================
auto_tagging:
  # Auto-tag images based on color/brightness/orientation
  # Auto-disabled in fast_mode
  # Adds: auto_tags, primary_tag columns
  # Tags: bright, dark, warm, cool, green, high-contrast,
  #        low-contrast, landscape, portrait, square
  # SPEED: small impact (~0.02 sec/image)
  # true  = auto tag
  # false = skip (faster)
  enabled: false

  # Model (heuristic color-based, no download needed)
  model: "mobilenet"

  # Max tags per image
  # 1-20, recommended: 5
  top_k: 5

  # Confidence threshold (not used in heuristic mode)
  confidence_threshold: 0.3


# ============================================================
# COMPARISON PAGES (HTML)
# ============================================================
comparison:
  # Generate HTML comparison pages for duplicates/similar
  # Creates browseable HTML showing groups side by side
  # SPEED: negligible (only runs after scan)
  # true  = generate HTML pages
  # false = skip
  enabled: true

  # Output folder for HTML files
  output_folder: "./comparisons"


# ============================================================
# ANALYTICS
# ============================================================
analytics:
  # Calculate storage analytics
  # Adds Analytics sheet to Excel
  # SPEED: negligible
  # true  = calculate analytics
  # false = skip
  enabled: true


# ============================================================
# VIDEO METADATA
# ============================================================
# Video duration extraction uses two methods:
#   1. OpenCV (cv2) - always available, works for most MP4/AVI
#   2. ffprobe - fallback for MKV/MOV/complex formats
#
# To install ffprobe (optional but recommended for videos):
#   Windows: download ffmpeg from https://ffmpeg.org, add to PATH
#   Mac: brew install ffmpeg
#   Linux: sudo apt install ffmpeg
#
# No config needed - auto-detects ffprobe availability


