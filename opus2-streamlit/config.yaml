
scan:
  folder_path: "C:\\Users\\ISSUser\\Desktop\\Sachin\\hdd\\pic\\Swapna\\Sandhya"
  recursive: true
  extensions:
    images: [jpg, jpeg, png, gif, bmp, tiff, tif, webp, heic, heif, raw, cr2, nef, arw, dng]
    videos: [mp4, mov, avi, mkv, 3gp, m4v, mpg, mpeg, wmv, flv, webm, mts]

blur_detection:
  enabled: true
  threshold: 100

duplicates:
  enabled: true
  hash_algorithm: "md5"
  match_mode: "exact"           # "exact" or "similar"
  similarity_threshold: 90
  selection_criteria: [quality, resolution, date, size]

organization:
  output_folder: "C:\\Users\\ISSUser\\Desktop\\Sachin\\hdd\\organized\\swapna"
  day_threshold: 60
  use_exif_date: true
  operation: "copy"
  conflict_resolution: "rename"

output:
  output_folder: "./reports"
  filename_prefix: "image_scan"
  sheets:
    all_images: true
    blurry_images: true
    duplicates: true
    summary: true
    quality_report: true
    analytics: true
    clusters: true

processing:
  threads: 4                    # 0=auto, 1=sequential
  show_progress: true
  verbose: false
  checkpoint_enabled: true
  checkpoint_interval: 100

# --- NEW FEATURES ---

face_detection:
  enabled: true                 # Set true to detect faces
  method: "opencv"

thumbnails:
  enabled: true
  size: [150, 100]
  output_folder: "./thumbnails"
  embed_in_excel: false

clustering:
  enabled: true                 # Set true for image clustering
  method: "color_histogram"
  n_clusters: 10
  min_cluster_size: 3

geocoding:
  enabled: true                 # Set true for reverse geocoding
  method: "offline"             # Uses reverse_geocoder library

auto_tagging:
  enabled: true                 # Set true for auto-tagging
  model: "mobilenet"
  top_k: 5
  confidence_threshold: 0.3

comparison:
  enabled: true
  output_folder: "./comparisons"

analytics:
  enabled: true

cloud:
  enabled: false
  provider: "none"              # "s3", "gcs", or "none"
  bucket: ""
  prefix: ""
  credentials_path: ""

streamlit:
  enabled: true
  port: 8501

logging:
  level: "INFO"
  file: "./logs/image_scanner.log"
  console: true

