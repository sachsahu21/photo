# ┌─────────────────────────────────────────────────────────────┐
# │                CONFIG QUICK REFERENCE                        │
# ├─────────────────────┬───────────────────────────────────────┤
# │ SETTING             │ OPTIONS                               │
# ├─────────────────────┼───────────────────────────────────────┤
# │ operation           │ "copy" | "move"                       │
# │ conflict_resolution │ "rename" | "skip" | "overwrite"       │
# │ hash_algorithm      │ "md5" | "sha256"                     │
# │ match_mode          │ "exact" | "similar"                   │
# │ method (face)       │ "opencv"                              │
# │ method (geo)        │ "offline"                             │
# │ method (cluster)    │ "color_histogram"                     │
# │ provider (cloud)    │ "none" | "s3" | "gcs"                │
# │ level (logging)     │ "DEBUG"|"INFO"|"WARNING"|"ERROR"      │
# │ fast_mode           │ true | false                          │
# │ skip_video_hash     │ true | false                          │
# │ reuse_existing      │ true | false                          │
# │ video_subfolder     │ true | false                          │
# │ recursive           │ true | false                          │
# │ embed_in_excel      │ true | false                          │
# │ threads             │ 0=auto | 1=single | 2-8              │
# │ threshold (blur)    │ 50=strict | 100=balanced | 200=lenient│
# │ similarity          │ 80=loose | 90=balanced | 95=strict    │
# │ n_clusters          │ 5=few | 10=balanced | 20=many         │
# │ day_threshold       │ 1=daily | 60=balanced | 999=monthly   │
# │ top_k (tags)        │ 3=few | 5=balanced | 10=many          │
# │ thumbnail size      │ [100,75] | [150,100] | [300,200]      │
# └─────────────────────┴───────────────────────────────────────┘
