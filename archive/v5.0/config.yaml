# =============================================================================
# IMAGE SCANNER v5.0 — CONFIGURATION
# =============================================================================
#
# REQUIRED: workspace.root
#   All tool-generated data lives under this folder (never in the code repo or
#   scan folder). On a new disk, change workspace.root plus the photo library
#   paths below (scan, organize, seed).
#
# Auto-created layout under workspace.root:
#   metadata/           per-file JSON vault + metadata-index.json
#   face_data/          face index SQLite + related files
#   untagged_people/    unknown-person sample exports
#   reports/            Excel workbooks
#   comparisons/        duplicate/similar HTML reports
#   thumbnails/         preview JPEGs (when enabled)
#   logs/               image-scanner.log
#   .scan_checkpoint.json
#   records-backup.pkl
#
# Artifact subfolders: use "subfolder" keys only (names, not full paths).
# =============================================================================

workspace:
  # REQUIRED absolute path — parent folder for all artifacts above.
  root: "C:\\Users\\ISSUser\\Desktop\\Sachin\\hdd\\pic\\artifacts"

# --- Photo libraries (NOT under workspace; you choose these paths) -----------

scan:
  # REQUIRED. Source folder to scan for images/videos.
  folder_path: "C:\\Users\\ISSUser\\Desktop\\Sachin\\hdd\\pic\\Sachin\\sach_unorganized\\test"
  # true = include subfolders; false = top level only
  recursive: true
  extensions:
    images:
      - jpg
      - jpeg
      - png
      - gif
      - bmp
      - tiff
      - tif
      - webp
      - heic
      - heif
      - raw
      - cr2
      - cr3
      - nef
      - arw
      - dng
      - orf
      - rw2
      - pef
      - sr2
      - raf
    videos:
      - mp4
      - mov
      - avi
      - mkv
      - 3gp
      - m4v
      - mpg
      - mpeg
      - wmv
      - flv
      - webm
      - mts
      - ts
      - vob

organization:
  # Organized photo library output (copy/move from scan source).
  output_folder: "C:\\Users\\ISSUser\\Desktop\\Sachin\\hdd\\organized"
  # flat | year | year-month-date
  folder_structure: "flat"
  # copy = keep originals; move = relocate into organized tree
  operation: "copy"
  retire_scan_path_json_on_organize: true
  # rename | skip | overwrite when filename exists
  conflict_resolution: "overwrite"
  # >= day_threshold files on one day → daily folder; else monthly folder
  day_threshold: 60
  use_exif_date: true
  reuse_existing_folders: true
  video_subfolder: true
  separate_screenshots: true
  screenshot_keywords:
    - screenshot
    - screen_shot
    - screen-shot
    - capture
    - snip
    - snipaste
    - sharex
    - screen recording
    - screenrecording
    - printscreen
  screenshot_detect_by_resolution: true
  screenshot_custom_resolutions: []

# --- Artifact subfolders (under workspace.root only) ---------------------------

metadata:
  subfolder: metadata
  # Optional: parent of partial scan trees for relative_path in JSON (multi-disk moves)
  library_root: ""
  store_relative_paths: true
  # organized | scan — which path reconcile prefers when both exist
  reconcile_prefer: "organized"
  # true = load *.json from nested subfolders under metadata/
  load_recursive: false
  # true = auto-fix vault paths after delete/organize/convert/merge
  auto_reconcile_paths: true
  # true = delete vault JSON when image missing everywhere (use with care)
  reconcile_remove_missing: true
  dedupe_on_reconcile: true
  dedupe_before_excel: true
  dedupe_after_scan: true
  dedupe_prefer: organized
  # skip_if_present | update_missing | refresh | full_overwrite
  update_strategy: "update_missing"
  schema_version: "1.0"
  tool_version: "v5.1"

faces:
  enabled: true
  data_subfolder: face_data
  index_db_filename: face_index.sqlite
  untagged_subfolder: untagged_people
  # Your seed photo library (NOT under workspace)
  seed_root: "C:\\Users\\ISSUser\\Desktop\\Sachin\\hdd\\pic\\Sachin\\1.Seed"
  target_person: ""
  # scan | organized — which library the face index searches
  library_source: "scan"
  similarity_threshold: 0.35
  similarity_threshold_percent: null
  max_results: 200
  export_untagged: true
  untagged_skip_duplicates: true
  untagged_cleanup_orphans: true
  untagged_max_samples: 1
  untagged_pick_best_quality: true
  untagged_export_mode: "full"

output:
  subfolder: reports
  filename_prefix: "image-scan"
  sheets:
    all_images: true
    blurry_images: true
    duplicates: true
    similar_images: true
    summary: true
    quality_report: true
    analytics: true
    clusters: true

thumbnails:
  enabled: false
  subfolder: thumbnails
  size: [150, 100]
  embed_in_excel: false

logging:
  level: "INFO"
  subfolder: logs
  log_filename: image-scanner.log
  console: true

processing:
  threads: 4
  show_progress: true
  verbose: false
  checkpoint_enabled: true
  checkpoint_interval: 100
  fast_mode: false
  skip_video_hash: false

# --- Scan-time analysis (results stored in metadata JSON + Excel) --------------

blur_detection:
  enabled: true
  threshold: 100

duplicates:
  enabled: true
  hash_algorithm: "md5"
  match_mode: "exact"
  similarity_threshold: 90
  selection_criteria:
    - quality
    - resolution
    - date
    - size

similar_detection:
  enabled: false
  ahash: true
  phash: true
  dhash: true
  color_histogram: false
  sift: false
  ahash_threshold: 6
  phash_threshold: 8
  dhash_threshold: 6
  histogram_threshold: 0.85
  sift_threshold: 30
  hash_size: 8
  max_compare_per_image: 100

face_detection:
  enabled: true
  method: "opencv"
  min_face_size: 24
  min_neighbors: 4
  scale_factor: 1.08

workflow:
  reset_dup_sim_for_excel: false
  excel_exclude_missing_files: false
  excel_include_file_exists_column: true

comparison:
  enabled: true
  subfolder: comparisons
  generate_after_excel: false

clustering:
  enabled: false
  method: "color_histogram"
  n_clusters: 10
  min_cluster_size: 3

geocoding:
  enabled: false
  method: "offline"

auto_tagging:
  enabled: false
  model: "mobilenet"
  top_k: 5
  confidence_threshold: 0.3

analytics:
  enabled: true

cloud:
  enabled: false
  provider: "none"
  bucket: ""
  prefix: ""
  credentials_path: ""

streamlit:
  enabled: false
  port: 8501
