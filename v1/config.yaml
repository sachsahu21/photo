# =========================================================
# Image Scanner Configuration
# =========================================================

scan:
  folder_path: "C:\\Users\\ISSUser\\Desktop\\Sachin\\hdd\\pic\\Swapna\\Diwali pics"
  recursive: true

  extensions:
    images:
      - jpg
      - jpeg
      - png
      - gif
      - bmp
      - tiff
      - tif
      - webp
      - heic
      - heif
      - raw
      - cr2
      - nef
      - arw
      - dng
      - orf
      - rw2
      - pef

    videos:
      - mp4
      - mov
      - avi
      - mkv
      - 3gp
      - m4v
      - mpg
      - mpeg
      - wmv
      - flv
      - webm
      - mts

# =========================================================
# BLUR DETECTION
# =========================================================
blur_detection:
  enabled: true
  threshold: 100
  quality_thresholds:
    very_blurry: 50
    blurry: 100
    fair: 200

# =========================================================
# DUPLICATE DETECTION
# =========================================================
duplicates:
  enabled: true
  hash_algorithm: "md5"         # md5 or sha256
  match_mode: "exact"           # "exact" = hash match, "similar" = perceptual hash
  similarity_threshold: 90      # 0-100%, only used when match_mode = "similar"
  auto_select_best: true
  selection_criteria:
    - quality
    - resolution
    - date
    - size

# =========================================================
# ORGANIZATION
# =========================================================
organization:
  output_folder: "C:\\Users\\ISSUser\\Desktop\\Sachin\\hdd\\organized"
  day_threshold: 60             # >= 60 pics on a day -> YYYYMMDD, else YYYYMM00
  use_exif_date: true
  operation: "copy"             # "copy" or "move"
  conflict_resolution: "overwrite" # "rename", "skip", "overwrite"

# =========================================================
# OUTPUT / EXCEL
# =========================================================
output:
  output_folder: "./reports"
  filename_prefix: "image_scan"
  sheets:
    all_images: true
    blurry_images: true
    duplicates: true
    summary: true
    quality_report: true

# =========================================================
# PROCESSING
# =========================================================
processing:
  threads: 0
  show_progress: true
  verbose: false

# =========================================================
# LOGGING
# =========================================================
logging:
  level: "INFO"
  file: "./logs/image_scanner.log"
  console: true
  
