# =============================================================================
# IMAGE SCANNER — CONFIGURATION
# Change workspace.root + scan/organize paths when moving to a new disk.
# =============================================================================

workspace:
  root: "C:\\Users\\ISSUser\\Desktop\\Sachin\\hdd\\artifacts"

# --- Photo libraries ----------------------------------------------------------

scan:
  folder_path: "C:\\Users\\ISSUser\\Desktop\\Sachin\\hdd\\pic"
  recursive: true
  extensions:
    images:
      - jpg
      - jpeg
      - png
      - gif
      - bmp
      - tiff
      - tif
      - webp
      - heic
      - heif
      - raw
      - cr2
      - cr3
      - nef
      - arw
      - dng
      - orf
      - rw2
      - pef
      - sr2
      - raf
    videos:
      - mp4
      - mov
      - avi
      - mkv
      - 3gp
      - m4v
      - mpg
      - mpeg
      - wmv
      - flv
      - webm
      - mts
      - ts
      - vob

organization:
  output_folder: "C:\\Users\\ISSUser\\Desktop\\Sachin\\hdd\\organized"
  # flat | year | year-month-date
  folder_structure: "year"
  # copy = keep originals; move = relocate into organized tree
  operation: "move"
  retire_scan_path_json_on_organize: true
  # rename | skip | overwrite when filename exists
  conflict_resolution: "overwrite"
  # >= day_threshold files on one day → daily subfolder; else monthly
  day_threshold: 60
  use_exif_date: true
  reuse_existing_folders: true
  video_subfolder: true
  separate_screenshots: true
  screenshot_keywords:
    - screenshot
    - screen_shot
    - screen-shot
    - capture
    - snip
    - snipaste
    - sharex
    - screen recording
    - screenrecording
    - printscreen
  screenshot_detect_by_resolution: true
  screenshot_custom_resolutions: []

# --- Metadata vault -----------------------------------------------------------

metadata:
  subfolder: metadata
  # Optional: set when files span multiple disks for correct relative_path
  library_root: ""
  store_relative_paths: true
  # organized | scan — which path wins when file exists in both
  reconcile_prefer: "organized"
  load_recursive: false
  auto_reconcile_paths: true
  dedupe_before_excel: false
  dedupe_after_scan: true
  dedupe_prefer: organized
  # skip_if_present | update_missing | refresh | full_overwrite
  update_strategy: "update_missing"
  # Extra folders option 23/25 will search (beyond scan + organized)
  extra_search_roots: []
  #  - "C:\\Users\\ISSUser\\Desktop\\Sachin\\hdd\\test"

# --- Faces & people -----------------------------------------------------------

faces:
  enabled: true
  data_subfolder: face_data
  index_db_filename: face_index.sqlite
  untagged_subfolder: untagged_people
  seed_root: "seed"
  target_person: ""
  # scan | organized — which library the face index searches
  library_source: "scan"
  similarity_threshold: 0.35
  max_results: 200
  export_untagged: true
  untagged_skip_duplicates: true
  untagged_cleanup_orphans: true
  untagged_max_samples: 1
  untagged_pick_best_quality: true
  untagged_export_mode: "full"

# --- Output & reporting -------------------------------------------------------

output:
  subfolder: reports
  filename_prefix: "image-scan"
  sheets:
    all_images: true
    blurry_images: true
    duplicates: true
    similar_images: true
    summary: true
    quality_report: true
    analytics: true
    clusters: true

thumbnails:
  enabled: false
  subfolder: thumbnails
  size: [150, 100]
  embed_in_excel: false

logging:
  level: "INFO"
  subfolder: logs
  log_filename: image-scanner.log
  console: true

# --- Processing ---------------------------------------------------------------

processing:
  threads: 8
  show_progress: true
  verbose: false
  checkpoint_enabled: true
  checkpoint_interval: 100
  checkpoint_subfolder: checkpoints
  scan_checkpoint_filename: .scan_checkpoint.json
  global_checkpoint_filename: global_checkpoint.json
  metadata_flush_interval: 100
  fast_mode: true
  skip_video_hash: false

enrich:
  # Fields option 22 will attempt to fill
  target_fields:
    - date_taken
    - camera_model
  use_parallel: true
  defer_index_rebuild: true
  flush_interval: 200

# --- Scan-time analysis -------------------------------------------------------

blur_detection:
  enabled: true
  threshold: 100

duplicates:
  enabled: true
  hash_algorithm: "md5"
  match_mode: "exact"
  similarity_threshold: 90
  selection_criteria:
    - quality
    - resolution
    - date
    - size

similar_detection:
  enabled: false
  ahash: true
  phash: true
  dhash: true
  ahash_threshold: 6
  phash_threshold: 8
  dhash_threshold: 6
  hash_size: 8
  max_compare_per_image: 100

face_detection:
  enabled: true
  method: "opencv"
  min_face_size: 24
  min_neighbors: 4
  scale_factor: 1.08

workflow:
  reset_dup_sim_for_excel: false
  excel_exclude_missing_files: false
  excel_include_file_exists_column: true

comparison:
  enabled: true
  subfolder: comparisons
  generate_after_excel: false

geocoding:
  enabled: false
  method: "offline"

auto_tagging:
  enabled: false
  model: "mobilenet"
  top_k: 5
  confidence_threshold: 0.3

analytics:
  enabled: true

quarantine:
  subfolder: quarantine
  preserve_relative_paths: true
  manifest_prefix: quarantine-manifest
